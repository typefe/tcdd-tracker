version: '3.8'

services:
  tcdd-bot:
    image: tcdd-bot:latest
    build: .
    container_name: tcdd-bot
    restart: unless-stopped
    environment:
      # Route configuration (comma-separated CITY1-CITY2 format)
      - ROUTES=${ROUTES}
      # Date configuration (comma-separated DD-MM-YYYY format)
      - CHECK_DATES=${CHECK_DATES}
      # Check interval in seconds (default: 300)
      - CHECK_INTERVAL=${CHECK_INTERVAL:-300}
      # Log level (DEBUG, INFO, WARNING, ERROR)
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Telegram bot configuration
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # TCDD API authentication
      - USER_AUTHORIZATION=${USER_AUTHORIZATION}
      - AUTHORIZATION=${AUTHORIZATION}
    # Optional: mount .env file for local development
    # volumes:
    #   - ./.env:/app/.env:ro
